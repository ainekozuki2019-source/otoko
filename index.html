<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>在りし日の幻影メーカー</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix"></script>
    <style>
        body { background: #111; color: white; text-align: center; font-family: sans-serif; margin: 0; padding: 10px; }
        .controls { background: #222; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #333; }
        canvas { max-width: 100%; height: auto; border: 2px solid #333; display: none; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        #status { margin: 15px; color: #00ff00; font-weight: bold; font-size: 0.9rem; min-height: 1.2em; }
        
        /* ボタンコンテナ */
        .button-group { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }

        .file-upload-label {
            display: inline-block;
            padding: 12px 20px;
            background: #444;
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            border: 2px solid #666;
            font-size: 0.9rem;
            flex: 1;
            min-width: 140px;
            max-width: 200px;
        }
        /* カメラボタンは少し強調 */
        .btn-camera { background: #555; border-color: #888; }
        
        input[type="file"] { display: none; }
        
        #downloadBtn { 
            display: none; 
            margin: 20px auto; 
            padding: 15px 30px; 
            background: #fff; 
            color: #000; 
            border: none; 
            border-radius: 5px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 1.1rem;
            width: 80%;
        }
    </style>
</head>
<body>
    <h1>在りし日の幻影メーカー</h1>
    
    <div class="controls">
        <div id="status">AI準備中...</div>
        
        <div class="button-group" id="btnGroup" style="opacity: 0.5; pointer-events: none;">
            <label class="file-upload-label btn-camera">
                📸 今すぐ撮影
                <input type="file" class="upload-input" accept="image/*" capture="camera">
            </label>
            
            <label class="file-upload-label">
                📁 画像を選択
                <input type="file" class="upload-input" accept="image/*">
            </label>
        </div>
    </div>

    <canvas id="mainCanvas"></canvas>
    <br>
    <button id="downloadBtn">この画像を保存する</button>

    <script>
        const inputs = document.querySelectorAll('.upload-input');
        const btnGroup = document.getElementById('btnGroup');
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        const downloadBtn = document.getElementById('downloadBtn');

        let net;
        const template = new Image();
        template.src = 'template.png';

        async function init() {
            try {
                net = await bodyPix.load();
                status.innerText = "準備完了！";
                btnGroup.style.opacity = "1.0";
                btnGroup.style.pointerEvents = "auto";
            } catch (e) {
                status.innerText = "エラー: 再読み込みしてください";
            }
        }
        init();

        // 全てのinputに対してイベントを設定
        inputs.forEach(input => {
            input.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                status.innerText = "漢たちの空へ召喚中...";
                const reader = new FileReader();
                reader.onload = (event) => {
                    const userImg = new Image();
                    userImg.onload = () => process(userImg);
                    userImg.src = event.target.result;
                };
                reader.readAsDataURL(file);
            });
        });

        async function process(userImg) {
            canvas.width = template.width;
            canvas.height = template.height;
            canvas.style.display = 'inline-block';

            const segmentation = await net.segmentPerson(userImg);
            const maskCanvas = document.createElement('canvas');
            maskCanvas.width = userImg.width;
            maskCanvas.height = userImg.height;
            const mCtx = maskCanvas.getContext('2d');
            mCtx.drawImage(userImg, 0, 0);
            
            const imgData = mCtx.getImageData(0, 0, maskCanvas.width, maskCanvas.height);
            for (let i = 0; i < segmentation.data.length; i++) {
                if (segmentation.data[i] === 0) {
                    imgData.data[i * 4 + 3] = 0;
                }
            }
            mCtx.putImageData(imgData, 0, 0);

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(template, 0, 0);

            const offscreen = document.createElement('canvas');
            offscreen.width = canvas.width;
            offscreen.height = canvas.height;
            const oCtx = offscreen.getContext('2d');

            oCtx.filter = 'grayscale(100%) contrast(450%) brightness(95%)';
            
            const drawW = canvas.width * 0.85;
            const drawH = (userImg.height / userImg.width) * drawW;
            const drawX = (canvas.width - drawW) / 2;
            const drawY = canvas.height * 0.05;

            oCtx.drawImage(maskCanvas, drawX, drawY, drawW, drawH);

            oCtx.globalCompositeOperation = 'multiply';
            const pCanvas = document.createElement('canvas');
            pCanvas.width = 3; pCanvas.height = 3;
            const pCtx = pCanvas.getContext('2d');
            pCtx.fillStyle = '#bbb';
            pCtx.fillRect(0,0,1,1);
            oCtx.fillStyle = oCtx.createPattern(pCanvas, 'repeat');
            oCtx.fillRect(drawX, drawY, drawW, drawH);

            ctx.globalAlpha = 0.65;
            ctx.drawImage(offscreen, 0, 0);
            ctx.globalAlpha = 1.0;

            status.innerText = "完成！";
            downloadBtn.style.display = 'block';
            window.scrollTo({ top: 300, behavior: 'smooth' });
        }

        downloadBtn.onclick = () => {
            const link = document.createElement('a');
            link.download = 'memorial.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        };
    </script>
</body>
</html>
